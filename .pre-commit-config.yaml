repos:
   - repo: https://github.com/astral-sh/ruff-pre-commit
     rev: v0.15.6
     hooks:
        - id: ruff-check  # Linter
          args: [--fix]  # Ensure fixes are applied
        - id: ruff-format  # Formatter
   - repo: https://github.com/pre-commit/mirrors-mypy
     rev: v1.9.0
     hooks:
        - id: mypy
          additional_dependencies: [
            "types-requests",
            "types-PyYAML",
            "tokenize-rt"
          ]